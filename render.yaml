services:
  - type: web
    name: fp-budget
    runtime: python
    buildCommand: pip install -r requirements.txt
    # Run migrations + seeds in a separate container BEFORE the web container
    # starts. This avoids blocking the gevent worker with synchronous psycopg2
    # calls — which was hanging deploys (worker couldn't answer health checks).
    preDeployCommand: RUN_BOOT_TASKS=1 python -c "import app"
    # Stock gunicorn sync worker — no gevent, no monkey-patching, no
    # SSL recursion issues, no dependency on the unmaintained
    # gevent-websocket package. Flask-SocketIO falls back to long-
    # polling transport which is plenty for our collaboration
    # features at current scale. Trade-off for a rock-solid deploy.
    # Workers=2 so two requests can be in flight concurrently.
    # Timeout 120s handles our largest PDF exports / migrations.
    startCommand: gunicorn -w 2 --bind 0.0.0.0:$PORT --timeout 120 app:app
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_MAPS_API_KEY
        sync: false
