services:
  - type: web
    name: fp-budget
    runtime: python
    buildCommand: pip install -r requirements.txt
    # Run migrations + seeds in a separate container BEFORE the web container
    # starts. This avoids blocking the gevent worker with synchronous psycopg2
    # calls — which was hanging deploys (worker couldn't answer health checks).
    preDeployCommand: RUN_BOOT_TASKS=1 python -c "import app"
    # gthread worker (2 processes × 8 threads = 16 concurrent slots).
    # Plain sync workers saturated immediately because Flask-SocketIO
    # polling sends ~2 requests/sec per open browser tab; workers
    # queued up and some responses got cross-contaminated / truncated
    # (style.css returning 218KB of budget HTML, etc.).
    #
    # gthread = real OS threads inside each worker. No gevent
    # monkey-patching, no SSL recursion, no dependency drama. Perfect
    # for a sync Flask app that does mostly database I/O + needs to
    # handle many concurrent HTTP requests.
    startCommand: gunicorn -k gthread -w 2 --threads 8 --bind 0.0.0.0:$PORT --timeout 120 app:app
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_MAPS_API_KEY
        sync: false
