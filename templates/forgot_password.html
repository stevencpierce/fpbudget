<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FPBudget — Forgot Password</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-page">
  <div class="login-card">
    <h1>FPBudget</h1>
    <p class="login-sub">Reset your password</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash flash-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <div class="field">
        <label>Your email address</label>
        <input type="email" name="email" required autofocus placeholder="you@example.com">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Send Reset Link</button>
      <div style="text-align:center;margin-top:1rem">
        <a href="{{ url_for('login') }}" style="font-size:.85rem;color:var(--text-muted,#888);text-decoration:none">← Back to login</a>
      </div>
    </form>
  </div>
</body>
</html>
