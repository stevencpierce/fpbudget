{% extends "base.html" %}
{% block title %}Change Password — FPBudget{% endblock %}

{% block content %}
<div style="max-width:420px;margin:48px auto">
  <h1>Change Password</h1>

  <form method="POST" action="{{ url_for('change_password') }}"
        style="display:flex;flex-direction:column;gap:16px;margin-top:24px">
    <div class="field">
      <label>Current Password</label>
      <input type="password" name="current_password" required autofocus>
    </div>
    <div class="field">
      <label>New Password</label>
      <input type="password" name="new_password" required minlength="6">
    </div>
    <div class="field">
      <label>Confirm New Password</label>
      <input type="password" name="confirm_password" required minlength="6">
    </div>
    <div>
      <button type="submit" class="btn btn-primary">Update Password</button>
      {% if not current_user.must_change_password %}
      <a href="{{ url_for('dashboard') }}" class="btn btn-outline" style="margin-left:8px">Cancel</a>
      {% endif %}
    </div>
  </form>
</div>
{% endblock %}
