<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FPBudget — Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-page">
  <div class="login-card">
    <h1>FPBudget</h1>
    <p class="login-sub">Framework Productions Budget Manager</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash flash-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" required autofocus>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="login-btn">Sign In</button>
      <div id="login-loading" style="display:none;text-align:center;margin-top:.75rem;font-size:.85rem;color:var(--text-muted,#888)">
        Starting up, this may take a moment...
      </div>
      <div style="text-align:center;margin-top:1rem">
        <a href="{{ url_for('forgot_password') }}" style="font-size:.85rem;color:var(--text-muted,#888);text-decoration:none">Forgot your password?</a>
      </div>
    </form>
  </div>
  <script>
  document.querySelector('form').addEventListener('submit', function() {
    var btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = 'Signing in...';
    setTimeout(function() {
      document.getElementById('login-loading').style.display = 'block';
    }, 3000);
  });
  </script>
</body>
</html>
