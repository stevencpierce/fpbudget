<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FPBudget — Set New Password</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-page">
  <div class="login-card">
    <h1>FPBudget</h1>
    <p class="login-sub">Set a new password</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash flash-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <div class="field">
        <label>New Password</label>
        <input type="password" name="new_password" required minlength="8" autofocus placeholder="Minimum 8 characters">
      </div>
      <div class="field">
        <label>Confirm New Password</label>
        <input type="password" name="confirm_password" required placeholder="Repeat your new password">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Set Password</button>
      <div style="text-align:center;margin-top:1rem">
        <a href="{{ url_for('login') }}" style="font-size:.85rem;color:var(--text-muted,#888);text-decoration:none">← Back to login</a>
      </div>
    </form>
  </div>
</body>
</html>
